name: Deploy OpenClaw to shady

on:
  push:
    branches: [main]
    paths:
      - 'docker-compose.yml'
      - '.env.example'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-openclaw
  cancel-in-progress: false

env:
  DEPLOY_DIR: /var/docker_projects/openclaw

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${{ secrets.DEPLOY_PORT || 22 }}"
          ssh-keyscan -p "$PORT" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync repo to host
        run: |
          set -euo pipefail
          PORT="${{ secrets.DEPLOY_PORT || 22 }}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '$DEPLOY_DIR'"
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='data/' \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$DEPLOY_DIR/"

      - name: Deploy
        run: |
          set -euo pipefail
          PORT="${{ secrets.DEPLOY_PORT || 22 }}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "DEPLOY_DIR='$DEPLOY_DIR' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_DIR"
          if [ ! -f .env ]; then
            echo "ERROR: $DEPLOY_DIR/.env is missing. Create it from .env.example before deploying." >&2
            exit 1
          fi
          docker compose pull
          # OPENCLAW_SKIP_ONBOARDING skips the wizard but does NOT write
          # gateway.mode, so the gateway errors with "Missing config" and
          # refuses to start. Write the minimal config (idempotent — persists
          # in ./data/config). Auth still comes from the token env.
          #   - gateway.mode/bind: required for the gateway to start at all.
          #   - controlUi.allowedOrigins: the gateway otherwise only allows
          #     localhost and rejects the browser served via the public domain
          #     ("origin not allowed"). Keep localhost entries for on-host use.
          docker compose run --rm --no-deps --entrypoint node openclaw-gateway \
            dist/index.js config set --batch-json \
            '[{"path":"gateway.mode","value":"local"},{"path":"gateway.bind","value":"lan"},{"path":"gateway.controlUi.allowedOrigins","value":["https://claw.mooibroek.dev","http://localhost:18789","http://127.0.0.1:18789"]}]'
          docker compose up -d --remove-orphans
          docker compose ps
          for i in $(seq 1 30); do
            status="$(docker inspect -f '{{.State.Health.Status}}' openclaw-gateway 2>/dev/null || echo missing)"
            echo "openclaw-gateway health: $status (try $i)"
            [ "$status" = "healthy" ] && exit 0
            sleep 5
          done
          echo "Gateway did not become healthy in time" >&2
          docker compose logs --tail=200 openclaw-gateway
          exit 1
          REMOTE
